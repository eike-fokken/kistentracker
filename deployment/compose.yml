# dbtrials deployment stack.
#
# Local (self-signed):   podman compose --env-file .env up -d --build
#   with SITE_ADDRESS=localhost (the default in .env.example).
# Internet (Let's Encrypt): set SITE_ADDRESS to your domain and ACME_EMAIL,
#   point the domain's DNS at this host, ensure ports 80+443 are reachable,
#   then run the same command.
#
# Run all commands from the deployment/ directory.

services:
  # One-shot: builds the SPA and drops the static files into the `frontend`
  # volume that Caddy serves, then exits.
  frontend-build:
    build:
      context: ..
      dockerfile: deployment/frontend.Dockerfile
    volumes:
      - frontend:/output

  # Django + gunicorn (serves /api, /admin and its own /static via WhiteNoise).
  backend:
    build:
      context: ..
      dockerfile: deployment/backend.Dockerfile
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      DJANGO_DB_PATH: /app/data/db.sqlite3
      DJANGO_STATIC_ROOT: /app/staticfiles
      DJANGO_BEHIND_PROXY: "true"
      GUNICORN_PORT: ${BACKEND_PORT:-8000}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
    volumes:
      - data:/app/data
    networks:
      - dbtrials
    restart: unless-stopped

  # # Public entrypoint: terminates TLS and serves SPA + reverse-proxies backend.
  # caddy:
  #   image: docker.io/library/caddy:2-alpine
  #   depends_on:
  #     backend:
  #       condition: service_started
  #     frontend-build:
  #       condition: service_completed_successfully
  #   environment:
  #     SITE_ADDRESS: ${SITE_ADDRESS}
  #     ACME_EMAIL: ${ACME_EMAIL:-}
  #     BACKEND_PORT: ${BACKEND_PORT}
  #     HTTP_PORT: ${HTTP_PORT}
  #     HTTPS_PORT: ${HTTPS_PORT}
  #   ports:
  #     - "${HTTP_PORT:-80}:${HTTP_PORT:-80}"
  #     - "${HTTPS_PORT:-443}:${HTTPS_PORT:-443}"
  #   volumes:
  #     - ${CADDYFILE:-./Caddyfile.local}:/etc/caddy/Caddyfile:ro
  #     - frontend:/srv/www:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   networks:
  #     - dbtrials
  #   restart: unless-stopped

networks:
  dbtrials:
    driver: bridge

volumes:
  frontend:
  data:
  caddy_data:
  caddy_config:
